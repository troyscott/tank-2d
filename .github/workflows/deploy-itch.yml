name: Deploy to itch.io

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "userversion label (e.g. v0.1.1)"
        required: true
        default: "manual"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ITCH_PROJECT: troyscott/tank-2d
      ITCH_CHANNEL: html5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build deps
        run: pip install pygbag numpy pygame

      - name: Build web bundle
        run: python -m pygbag --build --width 1024 --height 640 --title "Tank Game" main.py

      - name: Install butler
        run: |
          curl -fLo butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -o butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          VERSION="${{ github.event.release.tag_name || inputs.version }}"
          ./butler push build/web "${ITCH_PROJECT}:${ITCH_CHANNEL}" --userversion "$VERSION"
          ./butler status "${ITCH_PROJECT}"
